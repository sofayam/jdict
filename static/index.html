<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jdict</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0033bb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="jdict">
<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --muted: #666666;
    --border: #dddddd;
    --accent: #0033bb;
    --tag-bg: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
  }
  header {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .search-row { display: flex; gap: 8px; align-items: center; }
  #search {
    flex: 1;
    padding: 8px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    outline: none;
  }
  #search:focus { border-color: var(--text); }
  #status { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* Dict/Wiki mode toggle */
  #mode-toggle {
    flex-shrink: 0;
    padding: 5px 9px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--muted);
    font-family: inherit;
    white-space: nowrap;
  }
  #mode-toggle.wiki-active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Wiki search results */
  .wiki-result {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
  }
  .wiki-result:hover .wiki-result-slug { color: var(--accent); }
  .wiki-result-slug { font-size: 20px; font-weight: bold; }
  .wiki-result-reading { font-size: 13px; color: var(--muted); }
  .wiki-result-gloss { font-size: 13px; color: var(--muted); margin-left: auto; text-align: right; }

  main { padding: 0 10px 60px; }
  #meta {
    padding: 8px 0;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    min-height: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Search results */
  .entry {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .entry-main-link { flex-grow: 1; min-width: 0; }
  a.entry-link { text-decoration: none; color: inherit; display: block; }
  .entry-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .kanji { font-size: 20px; font-weight: bold; }
  .kana { font-size: 14px; color: var(--muted); }
  .sense { margin-bottom: 4px; }
  .pos {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: 4px;
  }
  .gloss:not(:last-child)::after { content: "; "; }
  .wiki-badge { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 1px 4px; border-radius: 2px; }
  .s-inf { font-size: 12px; color: var(--muted); font-style: italic; }

  #pagination { display: flex; gap: 16px; padding: 20px 0; justify-content: center; }

  button {
    padding: 6px 14px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .msg { text-align: center; padding: 40px; color: var(--muted); }
  a { color: var(--accent); }

  /* Entry detail */
  .entry-detail { padding: 12px 0; }
  .entry-detail .kanji { font-size: 28px; }
  .entry-detail .sense {
    margin: 8px 0 8px 12px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin: 20px 0 10px;
  }

  /* Wiki form */
  .wiki-form label {
    display: block;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .wiki-form textarea {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 14px;
    font-family: inherit;
    min-height: 160px;
    line-height: 1.5;
    resize: vertical;
  }
  .wiki-form textarea:focus { outline: none; border-color: var(--text); }

  .form-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .save-status { font-size: 12px; color: var(--muted); }
  .save-status.dirty { color: #c05000; font-weight: bold; }

  /* Edit mode toggle */
  .section-label-row { display: flex; align-items: center; justify-content: space-between; }
  .quill-btn { background: none; border: none; cursor: pointer; font-size: 22px; padding: 0 2px; opacity: 0.35; line-height: 1; }
  .quill-btn:hover, .quill-btn.active { opacity: 1; }

  /* View mode: fields locked down */
  .wiki-form.view-mode textarea { background: transparent; border-color: transparent; resize: none; cursor: default; color: var(--text); }
  .wiki-form.view-mode .tag-text-input { display: none; }
  .wiki-form.view-mode .lozenge-x { display: none; }
  .wiki-form.view-mode .drop-zone { pointer-events: none; border-color: transparent; padding: 0; }
  .wiki-form.view-mode .image-section:has(.drop-zone.dz-empty) { display: none; }
  .wiki-form.view-mode .dz-hint { display: none; }

  /* Notes: rendered div in view mode, textarea in edit mode */
  .wiki-form.view-mode #wiki-notes { display: none; }
  .wiki-form.view-mode #wiki-notes-rendered { display: block; }
  #wiki-notes-rendered { display: none; }
  .wiki-form.view-mode #wiki-notes-rendered:empty { display: none; }
  .wiki-notes-rendered { line-height: 1.6; }
  .wiki-notes-rendered h1 { margin: 0.5em 0 0.25em; font-size: 1.4em; font-weight: bold; }
  .wiki-notes-rendered h2 { margin: 0.5em 0 0.25em; font-size: 1.2em; font-weight: bold; }
  .wiki-notes-rendered h3 { margin: 0.5em 0 0.25em; font-size: 1em; font-weight: bold; }
  .wiki-notes-rendered p { margin: 0 0 0.5em; }
  .wiki-notes-rendered ul, .wiki-notes-rendered ol { margin: 0 0 0.5em; padding-left: 1.5em; }
  .wiki-notes-rendered code { font-family: monospace; background: var(--bg2, #f4f4f4); padding: 0 2px; border-radius: 2px; }
  .wiki-notes-rendered pre { background: var(--bg2, #f4f4f4); padding: 0.5em; border-radius: 4px; overflow-x: auto; }
  .wiki-notes-rendered blockquote { border-left: 3px solid var(--border); margin: 0; padding-left: 0.75em; color: #666; }

  /* Save button: only shown when dirty, always red */
  button.save-dirty { background: #c00; color: #fff; border-color: #c00; }

  /* Tag lozenge input */
  .tag-box {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 14px;
    cursor: text;
  }
  .tag-box:focus-within { border-color: var(--text); }
  .tag-text-input {
    flex-grow: 1;
    border: none;
    outline: none;
    padding: 3px 2px;
    font-size: 14px;
    min-width: 80px;
    font-family: inherit;
    background: transparent;
  }
  .lozenge {
    display: inline-flex;
    align-items: center;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 2px 8px 2px 10px;
    font-size: 12px;
    gap: 4px;
    white-space: nowrap;
  }
  .lozenge-link { color: inherit; text-decoration: none; }
  .lozenge-link:hover { text-decoration: underline; }
  .lozenge-x {
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    line-height: 1;
    padding: 0 1px;
  }
  .lozenge-x:hover { color: var(--text); }

  /* Image drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .drop-zone.drag-over { border-color: var(--accent); background: #f0f4ff; }
  .drop-zone img { max-width: 100%; max-height: 280px; display: block; margin: 0 auto 10px; border-radius: 3px; }
  .drop-zone input[type="file"] { display: none; }
  .drop-zone .dz-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .drop-zone .dz-remove { color: var(--accent); cursor: pointer; }

  /* Context list */
  .context-list { list-style: none; padding: 0; margin-bottom: 4px; }
  .context-list li { font-size: 12px; color: var(--muted); padding: 2px 0; }

  /* Wiki tab bar */
  .wiki-tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    margin: 8px 0 14px;
    gap: 0;
  }
  .wiki-tab {
    flex: 1;
    text-align: center;
    padding: 9px 4px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
  }
  .wiki-tab:hover { color: var(--text); }
  .wiki-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .wiki-tab-panel { display: none; }
  .wiki-tab-panel.active { display: block; }

  /* Recent words list */
  .recent-list { list-style: none; padding: 0; }
  .recent-list li { display: flex; align-items: baseline; justify-content: space-between; padding: 6px 2px; border-bottom: 1px solid var(--border); }
  .recent-list a { font-size: 17px; text-decoration: none; color: var(--text); }
  .recent-list a:hover { color: var(--accent); }
  .recent-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-left: 8px; }

  /* Wiki index (legacy lists, still used by getWikiIndexData callers) */
  .wiki-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  @media (max-width: 480px) { .wiki-cols { grid-template-columns: 1fr; } }
  .wiki-list { list-style: none; padding: 0; }
  .wiki-list li { padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .wiki-list a { text-decoration: none; color: var(--text); }
  .wiki-list a:hover { color: var(--accent); }
  .wiki-none { font-size: 12px; color: var(--muted); padding: 4px 0; }

  /* Wiki browse */
  #wiki-filter {
    width: 100%;
    padding: 8px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 4px;
    outline: none;
    font-family: inherit;
    margin-bottom: 2px;
  }
  #wiki-filter:focus { border-color: var(--text); }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px 12px; padding: 4px 0 8px; }
  .tag-cloud-item { text-decoration: none; color: var(--text); line-height: 1.4; }
  .tag-cloud-item:hover { color: var(--accent); }
  .tag-cloud-item sup { font-size: 9px; color: var(--muted); margin-left: 1px; }

  .wiki-stats { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .kana-grid { display: flex; flex-direction: column; gap: 2px; margin: 4px 0 12px; }
  .kana-row { display: flex; gap: 2px; }
  .kana-cell { display: inline-flex; align-items: baseline; justify-content: center; min-width: 36px; padding: 4px 2px; border-radius: 4px; font-size: 16px; text-align: center; }
  .kana-cell sup { font-size: 9px; color: var(--muted); margin-left: 1px; }
  .kana-cell-active { background: var(--bg2, #f0f0f0); text-decoration: none; color: var(--text); }
  .kana-cell-active:hover { background: var(--accent); color: #fff; }
  .kana-cell-active:hover sup { color: rgba(255,255,255,0.7); }
  .kana-cell-empty { color: var(--muted); opacity: 0.35; }

  .kana-word-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 12px; }
  .kana-word-entry { display: flex; align-items: baseline; gap: 10px; padding: 5px 2px; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); }
  .kana-word-entry:hover { background: var(--bg2, #f8f8f8); }
  .kana-word-slug { font-size: 17px; min-width: 80px; }
  .kana-word-reading { font-size: 13px; color: var(--muted); }
  .kana-word-english { font-size: 12px; color: var(--muted); margin-left: auto; text-align: right; }

  .kanji-grid { display: flex; flex-wrap: wrap; gap: 3px; margin: 8px 0 12px; }
  .kanji-cell { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 4px; font-size: 17px; text-decoration: none; color: var(--text); background: var(--bg2, #f0f0f0); border: none; cursor: pointer; font-family: inherit; padding: 0; }
  .kanji-cell-none { color: var(--muted); opacity: 0.3; }
  .kanji-cell-notes { background: #d4edda; color: #155724; }
  .kanji-cell-headword { background: #cce5ff; color: #004085; }
  .kanji-cell:hover { filter: brightness(0.88); }
  .kanji-detail-info { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 4px; }
  .kanji-detail-label { font-weight: 600; color: var(--text); margin-right: 4px; }
  .kanji-detail-meanings { color: var(--text); font-size: 15px; }
  .kanji-story-text { font-size: 14px; line-height: 1.6; margin: 6px 0 0; }
  .kanji-story-comment { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 4px 0 0; }
  .kanji-koohi-list { margin: 6px 0 0; padding-left: 20px; font-size: 14px; line-height: 1.6; }
  .kanji-koohi-list li { margin-bottom: 6px; }

  /* Image action buttons (Find / Paste) */
  .image-actions { display: flex; gap: 8px; margin: -8px 0 14px; flex-wrap: wrap; }
  .wiki-form.view-mode .image-actions { display: none; }
  .img-action-btn { font-size: 12px; padding: 5px 10px; color: var(--muted); }
  .img-action-btn:hover { color: var(--text); }
  #url-image-row:not([hidden]) { display: flex; }

  /* Tatoeba */
  .tatoeba-btn {
    display: inline-block;
    margin: 14px 0 4px;
    padding: 4px 10px;
    background: none;
    color: #a00;
    border: 1px solid #c88;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .tatoeba-btn:hover { background: #fff0f0; border-color: #a00; }
  .tatoeba-panel { margin: 8px 0 16px; }
  .tatoeba-sentence {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .tatoeba-text { flex: 1; min-width: 0; }
  .tatoeba-jp { font-size: 16px; margin-bottom: 2px; }
  .tatoeba-jp ruby { ruby-align: center; }
  .tatoeba-jp rt { font-size: 10px; color: var(--muted); }
  .tatoeba-en { font-size: 13px; color: var(--muted); }
  .tatoeba-use {
    flex-shrink: 0;
    padding: 5px 10px;
    font-size: 12px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tatoeba-use:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tatoeba-pager { display: flex; gap: 12px; align-items: center; justify-content: center; padding: 12px 0; font-size: 13px; color: var(--muted); }

  .podcast-group { border-bottom: 1px solid var(--border); }
  .podcast-group-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 11px 0;
    cursor: pointer;
    user-select: none;
  }
  .podcast-group-header:hover .podcast-group-name { color: var(--accent); }
  .podcast-group-name { font-size: 15px; font-weight: bold; }
  .podcast-group-stats { font-size: 12px; color: var(--muted); flex: 1; }
  .podcast-group-chevron { font-size: 11px; color: var(--muted); transition: transform 0.15s; display: inline-block; }
  .podcast-group.expanded .podcast-group-chevron { transform: rotate(90deg); }
  .podcast-group-episodes { display: none; padding-bottom: 4px; }
  .podcast-group.expanded .podcast-group-episodes { display: block; }

  .episode-card { padding: 10px 0 10px 12px; border-bottom: 1px solid var(--border); }
  .episode-card:last-child { border-bottom: none; }
  .episode-meta { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; }
  .episode-date { font-size: 11px; color: var(--muted); }
  .episode-title { font-size: 13px; color: var(--text); margin-bottom: 7px; }
  .episode-card .word-chips a { font-size: 15px; padding: 3px 10px; }

  /* Tag word grid */
  .word-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .word-chips a {
    display: inline-block;
    background: var(--tag-bg);
    border-radius: 4px;
    padding: 4px 12px;
    text-decoration: none;
    color: var(--text);
    font-size: 17px;
  }
  .word-chips a:hover { background: var(--border); }

  /* ── Kanji tap buttons ───────────────────────────────────────────────── */
  .kanji-tap {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    border-radius: 3px;
    -webkit-tap-highlight-color: rgba(0,51,187,0.15);
  }
  .kanji-tap:active { background: rgba(0,51,187,0.12); }

  /* ── Kanji bottom sheet ──────────────────────────────────────────────── */
  #kanji-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    -webkit-tap-highlight-color: transparent;
  }
  #kanji-backdrop.open { display: block; }

  #kanji-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.15);
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 82vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  #kanji-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 4px;
  }

  #kanji-sheet-body { padding: 4px 24px 16px; }

  .kanji-sheet-char {
    font-size: 56px;
    font-weight: bold;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 2px;
  }

  .kanji-sheet-svg {
    text-align: center;
    margin: 6px 0 14px;
  }
  .kanji-sheet-svg svg { width: 160px; height: 160px; }

  .kanji-reading-row {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .kanji-reading-label {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-right: 8px;
  }
  .kanji-meanings {
    font-size: 15px;
    margin: 10px 0 8px;
    line-height: 1.5;
  }
  .kanji-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .kanji-components { font-size: 15px; margin-top: 4px; }
  .kanji-sheet-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-top: 16px; margin-bottom: 2px; }
  .kanji-sheet-wiki-pages { font-size: 13px; margin: 4px 0; line-height: 1.8; }
  .kanji-sheet-wiki-notes { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="search-row">
    <input id="search" type="search" placeholder="Search…" autocomplete="off">
    <button id="mode-toggle" title="Switch between dictionary and wiki search">Dict</button>
    <div id="status">…</div>
  </div>
</header>

<main>
  <div id="meta"></div>
  <div id="results"><div class="msg">Enter text to search</div></div>
  <div id="pagination"></div>
  <datalist id="tags-list"></datalist>
</main>

<div id="kanji-backdrop"></div>
<div id="kanji-sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <div id="kanji-sheet-body"></div>
</div>

<script>
// ─── Helpers ──────────────────────────────────────────────────────────────────

function slugify(text) {
  return text.toString().trim()
    .replace(/[\s\/\?#%&]+/g, '-')
    .replace(/[^a-zA-Z0-9\u3000-\u303F\u3040-\u309F\u30A0-\u30FF\uFF00-\uFFEF\u4E00-\u9FAF\u3400-\u4DBF-]+/g, '')
    .replace(/--+/g, '-');
}

function primaryForm(entry) {
  return entry.kanji[0]?.keb || entry.kana[0]?.reb || '';
}

function readingForm(entry) {
  return entry.kanji.length ? (entry.kana[0]?.reb || '') : '';
}

function renderSenses(senses, max = Infinity) {
  return senses.slice(0, max).map(s => {
    const glosses = s.glosses.filter(g => g.lang === 'eng');
    if (!glosses.length) return '';
    return `<div class="sense">
      ${s.pos.length ? `<span class="pos">${s.pos[0]}</span>` : ''}
      ${glosses.map(g => `<span class="gloss">${g.text}</span>`).join('')}
      ${s.s_inf?.length ? `<div class="s-inf">${s.s_inf.join('; ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── Tag lozenge widget ───────────────────────────────────────────────────────

function makeTagWidget(container, initialTags, onChange) {
  let tags = [...initialTags];

  function renderLozenges() {
    container.querySelectorAll('.lozenge').forEach(el => el.remove());
    const input = container.querySelector('.tag-text-input');
    tags.forEach(tag => {
      const el = document.createElement('span');
      el.className = 'lozenge';
      el.innerHTML = `<a class="lozenge-link" href="/wiki/tag/${encodeURIComponent(tag)}">${tag}</a><span class="lozenge-x" data-tag="${tag}">×</span>`;
      container.insertBefore(el, input);
    });
  }

  container.addEventListener('click', e => {
    if (e.target.classList.contains('lozenge-x')) {
      tags = tags.filter(t => t !== e.target.dataset.tag);
      renderLozenges();
      onChange?.();
    } else if (e.target.closest('a')) {
      // In edit mode, suppress navigation and focus the input instead
      if (!container.closest('form')?.classList.contains('view-mode')) {
        e.preventDefault();
        container.querySelector('.tag-text-input').focus();
      }
    } else {
      container.querySelector('.tag-text-input').focus();
    }
  });

  const input = container.querySelector('.tag-text-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = input.value.trim().replace(/,+$/, '');
      if (val && !tags.includes(val)) { tags.push(val); renderLozenges(); onChange?.(); }
      else if (val && tags.includes(val)) { input.value = ''; } // already exists, just clear
      input.value = '';
    } else if (e.key === 'Backspace' && input.value === '' && tags.length) {
      tags.pop();
      renderLozenges();
      onChange?.();
    }
  });

  renderLozenges();
  return { getTags: () => [...tags] };
}

// ─── Image drop zone widget ───────────────────────────────────────────────────

function makeDropZone(zone, initialFilename, onChange) {
  let current = initialFilename || '';

  function showEmpty() {
    current = '';
    zone.classList.add('dz-empty');
    zone.innerHTML = `<div>Drop an image here or click to select</div><input type="file" accept="image/*">`;
    bindFileInput();
  }

  function showImage(filename) {
    current = filename;
    zone.classList.remove('dz-empty');
    zone.innerHTML = `
      <img src="/wiki/images/${filename}" alt="">
      <div class="dz-hint">Click or drop to replace &nbsp;·&nbsp; <span class="dz-remove">Remove</span></div>
      <input type="file" accept="image/*">
    `;
    zone.querySelector('.dz-remove').addEventListener('click', e => { e.stopPropagation(); showEmpty(); onChange?.(); });
    bindFileInput();
  }

  function showUploading() {
    zone.innerHTML = `<div>Uploading…</div>`;
  }

  function bindFileInput() {
    zone.querySelector('input[type="file"]').addEventListener('change', function() {
      if (this.files[0]) upload(this.files[0]);
    });
  }

  async function upload(file) {
    const prev = current;
    showUploading();
    const fd = new FormData();
    fd.append('image', file);
    try {
      const res = await fetch('/api/wiki/image-upload', { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      const { filename } = await res.json();
      showImage(filename);
      onChange?.();
    } catch {
      alert('Image upload failed');
      prev ? showImage(prev) : showEmpty();
    }
  }

  zone.addEventListener('click', () => zone.querySelector('input[type="file"]')?.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file?.type.startsWith('image/')) upload(file);
  });

  initialFilename ? showImage(initialFilename) : showEmpty();
  return { getFilename: () => current, setImage: showImage };
}

// ─── Search ───────────────────────────────────────────────────────────────────

async function doSearch(q, offset = 0) {
  if (!q.trim()) {
    resultsDiv.innerHTML = '<div class="msg">Enter text to search</div>';
    paginationDiv.innerHTML = '';
    return;
  }
  resultsDiv.innerHTML = '<div class="loading">Searching…</div>';
  try {
    const data = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=${LIMIT}&offset=${offset}`).then(r => r.json());
    renderSearchResults(data, q, offset);
  } catch {
    resultsDiv.innerHTML = '<div class="msg">Search failed</div>';
  }
}

function renderSearchResults(data, q, offset) {
  if (!data.results?.length) {
    resultsDiv.innerHTML = '<div class="msg">No results</div>';
    paginationDiv.innerHTML = '';
    return;
  }

  const podParams = podcastName
    ? `?podcast=${encodeURIComponent(podcastName)}&episode=${encodeURIComponent(podcastEp)}&timestamp=${encodeURIComponent(podcastTs)}`
    : '';

  resultsDiv.innerHTML = data.results.map(e => `
    <div class="entry" data-slug="${slugify(primaryForm(e))}">
      <div class="entry-main-link">
        <a class="entry-link" href="/entry/${e.seq}${podParams}">
          <div class="entry-head">
            <span class="kanji">${primaryForm(e)}</span>
            ${readingForm(e) ? `<span class="kana">${readingForm(e)}</span>` : ''}
          </div>
          ${renderSenses(e.senses, 2)}
        </a>
      </div>
    </div>
  `).join('');

  const epoch = ++searchEpoch;
  fetch('/api/wiki/exists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slugs: data.results.map(e => slugify(primaryForm(e))) }),
  }).then(r => r.json()).then(exists => {
    if (searchEpoch !== epoch) return;
    for (const [slug, has] of Object.entries(exists)) {
      if (!has) continue;
      const head = resultsDiv.querySelector(`[data-slug="${slug}"] .entry-head`);
      if (head) head.insertAdjacentHTML('beforeend', `<a class="wiki-badge" href="/wiki/word/${slug}">wiki</a>`);
    }
  });

  paginationDiv.innerHTML = '';
  if (offset > 0) {
    const btn = document.createElement('button');
    btn.textContent = '← Previous';
    btn.onclick = () => { currentOffset -= LIMIT; doSearch(q, currentOffset); scrollTo(0, 0); };
    paginationDiv.appendChild(btn);
  }
  if (data.results.length === LIMIT) {
    const btn = document.createElement('button');
    btn.textContent = 'Next →';
    btn.onclick = () => { currentOffset += LIMIT; doSearch(q, currentOffset); scrollTo(0, 0); };
    paginationDiv.appendChild(btn);
  }
}

// ─── Entry detail ─────────────────────────────────────────────────────────────

async function renderEntryPage(seq) {
  setMeta(`<a href="javascript:history.back()">← Back</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  let entry;
  try {
    entry = await fetch(`/api/entry/${seq}`).then(r => r.json());
  } catch { resultsDiv.innerHTML = '<div class="msg">Failed to load entry</div>'; return; }
  if (entry.error) { resultsDiv.innerHTML = `<div class="msg">${entry.error}</div>`; return; }

  document.title = `${primaryForm(entry)} — jdict`;

  const slug = slugify(primaryForm(entry));
  const wikiRes = await fetch(`/api/wiki/word/${slug}`);
  const hasWiki = wikiRes.ok;

  // If this lookup came from a podcast, silently append a context to the existing wiki page
  if (hasWiki && podcastName) {
    const existing = await wikiRes.json();
    const ctx = { source: pageSource || `entry:${entry.seq}`, timestamp: new Date().toISOString(),
                  podcast: podcastName, episode: podcastEp, podcastTimestamp: podcastTs };
    existing.contexts = [...(existing.contexts || []), ctx];
    fetch(`/api/wiki/word/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(existing),
    });
  }

  resultsDiv.innerHTML = `
    <div class="entry-detail">
      <div class="entry-head">
        <span class="kanji">${entry.kanji.map(k => k.keb).join('、') || entry.kana.map(k => k.reb).join('、')}</span>
        ${entry.kanji.length ? `<span class="kana">${entry.kana.map(k => k.reb).join('、')}</span>` : ''}
      </div>
      ${renderSenses(entry.senses)}
      <div style="margin-top: 20px;">
        <button class="primary" id="wiki-btn">${hasWiki ? 'View in Wiki' : '+ Add to Wiki'}</button>
      </div>
    </div>
  `;

  document.getElementById('wiki-btn').addEventListener('click', () => {
    if (hasWiki) { location.href = `/wiki/word/${slug}`; return; }
    addToWiki(entry);
  });
}

async function addToWiki(entry) {
  const btn = document.getElementById('wiki-btn');
  btn.disabled = true;
  btn.textContent = '…';

  const slug = slugify(primaryForm(entry));

  // If wiki page already exists, go straight there (context already appended on page load)
  const check = await fetch(`/api/wiki/word/${slug}`);
  if (check.ok) { location.href = `/wiki/word/${slug}`; return; }

  // Create a new page, pre-filled with the top glosses
  const notes = '';
  const contexts = [];
  if (podcastName) {
    contexts.push({ source: pageSource || `entry:${entry.seq}`, timestamp: new Date().toISOString(),
                    podcast: podcastName, episode: podcastEp, podcastTimestamp: podcastTs });
  }

  try {
    await fetch(`/api/wiki/word/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        seq: entry.seq,
        word: primaryForm(entry),
        notes,
        tags: [],
        contexts,
        image: '',
      }),
    });
    location.href = `/wiki/word/${slug}`;
  } catch {
    btn.disabled = false;
    btn.textContent = '+ Add to Wiki';
    alert('Failed to create wiki page');
  }
}

// ─── Wiki word page ───────────────────────────────────────────────────────────

async function renderWikiWordPage(slug) {

          let podcastSuffix = '';
          if (c.podcast) {

            const podcastPort = (window._jdictConfig || {}).podcastPort;
            if (podcastPort) {
              // Encode episode as a path segment: encode ASCII specials but leave Unicode readable
              const epSeg = c.episode.replace(/\.mp3$/i, '').split('').map(ch => ch === '/' || ch.charCodeAt(0) > 127 ? ch : encodeURIComponent(ch)).join('');
              const playUrl = `http://${window.location.hostname}:${podcastPort}/play${epSeg}?t=${c.podcastTimestamp}&from=wiki`;
              podcastSuffix = ` — <a href="${playUrl}" target="_blank">${epLabel}</a>`;
            } else {
              podcastSuffix = ` — ${epLabel}`;
            }
          }
          return `<li>${new Date(c.timestamp).toLocaleDateString()} — ${srcHtml}${podcastSuffix}</li>`;
        }).join('')}
      </ul>
    ` : ''}

    <div class="section-label section-label-row">Notes &amp; Tags <button type="button" class="quill-btn" id="edit-toggle" title="Edit">🖊️</button></div>
    <form class="wiki-form view-mode" id="wiki-form">
      <label>Tags</label>
      <div class="tag-box" id="tag-box">
        <input class="tag-text-input" type="text" list="tags-list" placeholder="Add tag…">
      </div>

      <label for="wiki-notes">Notes</label>
      <div id="wiki-notes-rendered" class="wiki-notes-rendered"></div>
      <textarea id="wiki-notes" readonly></textarea>

      <div class="image-section">
        <label>Image</label>
        <div class="drop-zone" id="drop-zone"></div>
      </div>
      <div class="image-actions">
        <button type="button" class="img-action-btn" id="find-image-btn">Find on Google Images…</button>
        <button type="button" class="img-action-btn" id="paste-image-btn" hidden>Paste from clipboard</button>
        <button type="button" class="img-action-btn" id="url-image-btn">Import from URL…</button>
      </div>

        <input type="url" id="url-image-input" placeholder="Paste image URL…" style="flex:1;font-size:14px;padding:4px 6px;border:1px solid var(--border);border-radius:4px">
        <button type="button" class="img-action-btn" id="url-image-go">Import</button>
      </div>

      <div class="form-row">
        <button type="submit" class="primary" id="save-btn" hidden>Save</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </form>
  `;

  document.getElementById('wiki-notes-rendered').innerHTML = wiki.notesHtml || '';
  document.getElementById('wiki-notes').value = wiki.notes || '';

  const statusEl  = document.getElementById('save-status');
  const saveBtn   = document.getElementById('save-btn');
  const wikiForm  = document.getElementById('wiki-form');
  const editToggle = document.getElementById('edit-toggle');
  let isDirty = false;

  function setEditMode(on) {
    wikiForm.classList.toggle('view-mode', !on);
    editToggle.classList.toggle('active', on);
    document.getElementById('wiki-notes').readOnly = !on;
  }
  editToggle.addEventListener('click', () => setEditMode(wikiForm.classList.contains('view-mode')));

  function markDirty() {
    isDirty = true;
    saveBtn.hidden = false;
    saveBtn.classList.add('save-dirty');
  }

  async function save() {
    saveBtn.disabled = true;
    statusEl.textContent = 'Saving…';
    try {
      await fetch(`/api/wiki/word/${slug}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          seq: wiki.seq,
          word: wiki.word,
          tags: tagWidget.getTags(),
          notes: document.getElementById('wiki-notes').value,
          contexts: wiki.contexts || [],
          image: dropZone.getFilename(),
        }),
      });
      isDirty = false;
      saveBtn.hidden = true;
      saveBtn.classList.remove('save-dirty');
      statusEl.textContent = 'Saved';
      populateTagsDatalist();
      // Refresh the rendered notes so view mode shows the updated content
      fetch(`/api/wiki/word/${slug}`).then(r => r.ok ? r.json() : null).then(fresh => {
        if (fresh) document.getElementById('wiki-notes-rendered').innerHTML = fresh.notesHtml || '';
      }).catch(() => {});
    } catch {
      statusEl.textContent = 'Save failed';
    } finally {
      saveBtn.disabled = false;
      setTimeout(() => { if (!isDirty) statusEl.textContent = ''; }, 2500);
    }
  }

  const tagWidget = makeTagWidget(document.getElementById('tag-box'), wiki.tags || [], () => save());
  const dropZone  = makeDropZone(document.getElementById('drop-zone'), wiki.image || '', markDirty);

  document.getElementById('wiki-notes').addEventListener('input', markDirty);
  document.getElementById('wiki-form').addEventListener('submit', e => { e.preventDefault(); save(); });

  // ── Image actions ──────────────────────────────────────────────────────────
  document.getElementById('find-image-btn').addEventListener('click', () => {
    sessionStorage.setItem('sharedImageTarget', slug);
    window.open(`https://www.google.com/search?q=${encodeURIComponent(displayName)}&tbm=isch`, '_blank');
  });

  const pasteBtn = document.getElementById('paste-image-btn');
  if (navigator.clipboard?.read) {
    pasteBtn.hidden = false;
    pasteBtn.addEventListener('click', async () => {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imageType = item.types.find(t => t.startsWith('image/'));
          if (imageType) {
            const blob = await item.getType(imageType);
            const ext  = imageType.split('/')[1] || 'png';
            const fd   = new FormData();
            fd.append('image', new File([blob], `paste.${ext}`, { type: imageType }));
            const res  = await fetch('/api/wiki/image-upload', { method: 'POST', body: fd });
            const { filename } = await res.json();
            dropZone.setImage(filename);
            setEditMode(true);
            markDirty();
            return;
          }
        }
        alert('No image found in clipboard');
      } catch { alert('Clipboard access was denied'); }
    });
  }

  // ── Import from URL ────────────────────────────────────────────────────────
  document.getElementById('url-image-btn').addEventListener('click', () => {
    const row = document.getElementById('url-image-row');
    row.hidden = !row.hidden;
    if (!row.hidden) document.getElementById('url-image-input').focus();

  async function importFromUrl() {

    if (!url) return;
    const goBtn = document.getElementById('url-image-go');
    goBtn.disabled = true;
    goBtn.textContent = 'Importing…';

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();

      setEditMode(true);
      markDirty();
      input.value = '';
      document.getElementById('url-image-row').hidden = true;
    } catch (err) {
      alert(`Import failed: ${err.message}`);
    } finally {
      goBtn.disabled = false;
      goBtn.textContent = 'Import';
    }
  }

  document.getElementById('url-image-go').addEventListener('click', importFromUrl);
  document.getElementById('url-image-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); importFromUrl(); }
  });

  // ── Pending shared image (from Web Share Target) ───────────────────────────
  const pendingImage = sessionStorage.getItem('pendingImage');
  if (pendingImage) {
    sessionStorage.removeItem('pendingImage');
    dropZone.setImage(pendingImage);
    markDirty();
    save();
  }

  // ── Tatoeba ────────────────────────────────────────────────────────────────
  // Search word to use: primary kanji form, or kana if no kanji
  const tatoebaWord = entry
    ? (entry.kanji[0]?.keb || entry.kana[0]?.reb)
    : slug;

  if (tatoebaWord) {
    // Silently check if any sentences exist
    fetch(`/api/tatoeba/search?q=${encodeURIComponent(tatoebaWord)}&page=1&limit=1`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data || data.total === 0) return;
        // Inject the button after the wiki form
        const btn = document.createElement('button');
        btn.className = 'tatoeba-btn';
        btn.textContent = `Tatoeba  ${data.total.toLocaleString()} sentences`;
        resultsDiv.appendChild(btn);

        const panel = document.createElement('div');
        panel.className = 'tatoeba-panel';
        panel.hidden = true;
        resultsDiv.appendChild(panel);

        let currentPage = 1;
        const PAGE_SIZE = 20;
        const totalSentences = data.total;

        async function loadPage(page) {
          panel.innerHTML = '<div class="loading">Loading…</div>';
          panel.hidden = false;
          const r = await fetch(`/api/tatoeba/search?q=${encodeURIComponent(tatoebaWord)}&page=${page}&limit=${PAGE_SIZE}`);
          const d = await r.json();
          currentPage = page;
          const totalPages = Math.ceil(totalSentences / PAGE_SIZE);

          const rows = d.results.map(s => {
            const en = s.translations.join(' / ');
            const jpHtml = s.reading ? tatoebaToRuby(s.reading) : escHtml(s.japanese);
            return `
              <div class="tatoeba-sentence">
                <div class="tatoeba-text">
                  <div class="tatoeba-jp">${jpHtml}</div>
                  <div class="tatoeba-en">${escHtml(en)}</div>
                </div>
                <button class="tatoeba-use" data-jp="${escAttr(s.japanese)}" data-en="${escAttr(en)}" data-reading="${escAttr(s.reading || '')}">Use</button>
              </div>`;
          }).join('');

          const pager = totalPages > 1 ? `
            <div class="tatoeba-pager">
              <button ${page <= 1 ? 'disabled' : ''} id="tat-prev">← Prev</button>
              <span>Page ${page} / ${totalPages}</span>
              <button ${page >= totalPages ? 'disabled' : ''} id="tat-next">Next →</button>
            </div>` : '';

          panel.innerHTML = rows + pager;

          panel.querySelectorAll('.tatoeba-use').forEach(useBtn => {
            useBtn.addEventListener('click', () => {
              const jp = useBtn.dataset.jp;
              const en = useBtn.dataset.en;
              const reading = useBtn.dataset.reading;
              const jpRendered = reading ? tatoebaToRuby(reading) : escHtml(jp);
              const notesEl = document.getElementById('wiki-notes');
              const current = notesEl.value.trimEnd();
              const hasSection = /^# Tatoeba$/m.test(current);
              const insertion = hasSection
                ? `\n- ${jpRendered}（${en}）`
                : `\n\n# Tatoeba\n- ${jpRendered}（${en}）`;
              notesEl.value = current + insertion;
              notesEl.scrollTop = notesEl.scrollHeight;
              setEditMode(false);
              markDirty();
              save();
            });
          });

          if (totalPages > 1) {
            document.getElementById('tat-prev')?.addEventListener('click', () => loadPage(page - 1));
            document.getElementById('tat-next')?.addEventListener('click', () => loadPage(page + 1));
          }
        }

        btn.addEventListener('click', () => {
          if (!panel.hidden) { panel.hidden = true; return; }
          loadPage(currentPage);
        });
      })
      .catch(() => {});  // tatoeba db not present — silently skip
  }
}

async function renderWikiIndexPage() {
  setMeta(`<a href="/">← Search</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  const data = await fetch('/api/wiki/browse').then(r => r.json());

  function epLabel(episode, podcast) {
    let s = (episode || '').replace(/\.mp3$/i, '');
    const prefix = '/' + podcast + '/';
    if (s.startsWith(prefix)) s = s.slice(prefix.length);
    return s || episode;
  }

  function fmtMonth(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
  }

  function renderPodcasts(filter) {
    const q = filter.trim().toLowerCase();
    const filtering = q.length > 0;
    let html = '';
    let anyMatch = false;

    for (const podcast of data.podcasts) {
      let epHtml = '';
      let epMatches = 0;
      const matchedWords = new Set();

      for (const ep of podcast.episodes) {
        const words = filtering ? ep.words.filter(w => w.toLowerCase().includes(q)) : ep.words;
        if (filtering && !words.length) continue;
        epMatches++;
        words.forEach(w => matchedWords.add(w));
        const date = ep.latestTimestamp ? new Date(ep.latestTimestamp).toLocaleDateString() : '';
        const label = epLabel(ep.episode, podcast.name);
        epHtml += `<div class="episode-card">
          <div class="episode-meta"><span class="episode-date">${date}</span></div>
          <div class="episode-title">${escHtml(label)}</div>
          <div class="word-chips">${words.map(w =>
            `<a href="/wiki/word/${encodeURIComponent(w)}">${escHtml(w)}</a>`
          ).join('')}</div>
        </div>`;
      }

      if (filtering && !epMatches) continue;
      anyMatch = true;

      const wordCount = filtering ? matchedWords.size : podcast.wordCount;
      const epCount   = filtering ? epMatches : podcast.episodeCount;

      html += `<div class="podcast-group${filtering ? ' expanded' : ''}">
        <div class="podcast-group-header" onclick="this.parentElement.classList.toggle('expanded')">
          <span class="podcast-group-name">${escHtml(podcast.name)}</span>
          <span class="podcast-group-stats">${wordCount} words · ${epCount} episodes</span>
          <span class="podcast-group-chevron">▸</span>
        </div>
        <div class="podcast-group-episodes">${epHtml}</div>
      </div>`;
    }

    return anyMatch ? html : '<p class="wiki-none">No matches</p>';
  }

  const tagCloud = data.tags.length
    ? data.tags.map(t => {
        const size = Math.round(Math.max(11, Math.min(22, 11 + Math.sqrt(t.count) * 3)));
        return `<a href="/wiki/tag/${encodeURIComponent(t.name)}" class="tag-cloud-item" style="font-size:${size}px">${escHtml(t.name)}<sup>${t.count}</sup></a>`;
      }).join('')
    : '';

  const { wordCount, podcastCount, earliest, latest } = data.stats;
  const dateRange = earliest ? `${fmtMonth(earliest)} – ${fmtMonth(latest)}` : '';

  // Kana index grid
  const kana = await fetch('/api/wiki/kana-index').then(r => r.json());
  const GOJUUON = ['あいうえお','かきくけこ','さしすせそ','たちつてと','なにぬねの',
                   'はひふへほ','まみむめも','やゆよ','らりるれろ','わをん'];
  function kanaCell(ch, counts) {
    const n = (counts.words[ch] || 0) + (counts.cards[ch] || 0);
    const cls = n ? 'kana-cell kana-cell-active' : 'kana-cell kana-cell-empty';
    return n
      ? `<a href="/wiki/kana/${encodeURIComponent(ch)}" class="${cls}">${ch}<sup>${n}</sup></a>`
      : `<span class="${cls}">${ch}</span>`;
  }
  const kanaGrid = `<div class="kana-grid">${
    GOJUUON.map(row => `<div class="kana-row">${[...row].map(ch => kanaCell(ch, kana)).join('')}</div>`).join('')
  }</div>`;

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
  }

  function recentList(rows, dateField) {
    if (!rows.length) return '<p class="wiki-none">Nothing yet</p>';
    return `<ul class="recent-list">${rows.map(r =>
      `<li><a href="/wiki/word/${encodeURIComponent(r.slug)}">${escHtml(r.slug)}</a><span class="recent-date">${fmtDate(r[dateField])}</span></li>`
    ).join('')}</ul>`;
  }

  resultsDiv.innerHTML = `
    <div style="font-size:22px;font-weight:bold;margin:12px 0 4px">Wiki</div>
    <div class="wiki-stats">${wordCount} words · ${podcastCount} podcasts${dateRange ? ` · ${dateRange}` : ''}</div>

    <div class="wiki-tabs">
      <button class="wiki-tab" data-tab="index">Index</button>
      <button class="wiki-tab" data-tab="recent">Recent</button>
      <button class="wiki-tab" data-tab="tags">Tags</button>
      <button class="wiki-tab" data-tab="podcasts">Podcasts</button>
      <button class="wiki-tab" data-tab="kanjis">Kanjis</button>
    </div>

    <div class="wiki-tab-panel" id="tab-index">
      ${kanaGrid}
    </div>

    <div class="wiki-tab-panel" id="tab-recent">
      <div class="section-label">Recently changed</div>
      ${recentList(data.recentUpdated, 'updated_at')}
      <div class="section-label" style="margin-top:20px">Recently added</div>
      ${recentList(data.recentCreated, 'created_at')}
    </div>

    <div class="wiki-tab-panel" id="tab-tags">
      ${tagCloud ? `<div class="tag-cloud">${tagCloud}</div>` : '<p class="wiki-none">No tags yet</p>'}
    </div>

    <div class="wiki-tab-panel" id="tab-podcasts">
      <input type="search" id="wiki-filter" placeholder="Filter words…" autocomplete="off" style="margin-bottom:10px">
      <div id="podcast-list">${renderPodcasts('')}</div>
    </div>

    <div class="wiki-tab-panel" id="tab-kanjis">
      <div id="kanji-grid-container"><div class="loading">Loading…</div></div>
    </div>
  `;

  // Tab switching — honour location.hash on load, default to index
  const TABS = ['index', 'recent', 'tags', 'podcasts', 'kanjis'];
  let kanjiGridLoaded = false;
  function activateTab(name) {
    if (!TABS.includes(name)) name = 'index';
    document.querySelectorAll('.wiki-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.wiki-tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
    history.replaceState(null, '', `/wiki#${name}`);
    if (name === 'kanjis' && !kanjiGridLoaded) {
      kanjiGridLoaded = true;
      fetch('/api/wiki/kanji-coverage').then(r => r.json()).then(rows => {
        const cells = rows.map(r => {
          const cls = r.status === 'headword' ? 'kanji-cell kanji-cell-headword'
                    : r.status === 'notes'    ? 'kanji-cell kanji-cell-notes'
                    : 'kanji-cell kanji-cell-none';
          return `<button class="${cls}" data-char="${escAttr(r.literal)}">${escHtml(r.literal)}</button>`;
        }).join('');
        const grid = document.getElementById('kanji-grid-container');
        grid.innerHTML = `<div class="kanji-grid">${cells}</div>`;
        grid.addEventListener('click', e => {
          const btn = e.target.closest('[data-char]');
          if (btn) showKanjiSheet(btn.dataset.char);
        });
      });
    }
  }
  document.querySelectorAll('.wiki-tab').forEach(b => {
    b.addEventListener('click', () => activateTab(b.dataset.tab));
  });
  activateTab((location.hash || '').replace('#', '') || 'index');

  document.getElementById('wiki-filter').addEventListener('input', e => {
    document.getElementById('podcast-list').innerHTML = renderPodcasts(e.target.value);
  });
}

// ─── Misc ─────────────────────────────────────────────────────────────────────

function setMeta(html) {
  metaDiv.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(str) {
  return escHtml(str).replace(/"/g, '&quot;');
}

// Convert Tatoeba furigana markup to HTML ruby.
// Format: [kanji|part1|part2…] where parts joined = reading.
// Plain text outside brackets is HTML-escaped and passed through as-is.
function tatoebaToRuby(str) {
  if (!str) return '';
  let out = '';
  let i = 0;
  while (i < str.length) {
    if (str[i] === '[') {
      const end = str.indexOf(']', i);
      if (end === -1) { out += escHtml(str[i++]); continue; }
      const parts = str.slice(i + 1, end).split('|');
      if (parts.length >= 2) {
        out += `<ruby>${escHtml(parts[0])}<rt>${escHtml(parts.slice(1).join(''))}</rt></ruby>`;
      } else {
        out += escHtml(parts[0]);
      }
      i = end + 1;
    } else {
      out += escHtml(str[i++]);
    }
  }
  return out;
}

// ─── Kanji drill-down ─────────────────────────────────────────────────────────

function wrapKanji(text) {
  return [...text].map(ch => {
    const cp = ch.codePointAt(0);
    if ((cp >= 0x4e00 && cp <= 0x9fff) || (cp >= 0x3400 && cp <= 0x4dbf)) {
      return `<button class="kanji-tap" data-char="${escHtml(ch)}">${escHtml(ch)}</button>`;
    }
    return escHtml(ch);
  }).join('');
}

function animateKanjiSvg(svgEl) {
  const strokesGroup = svgEl.querySelector('[id^="kvg:StrokePaths"]');
  const numbersGroup = svgEl.querySelector('[id^="kvg:StrokeNumbers"]');
  if (!strokesGroup) return;

  const paths = Array.from(strokesGroup.querySelectorAll('path'));
  const strokeDuration = 300;
  const strokeGap = 60;

  if (numbersGroup) numbersGroup.style.opacity = '0';

  paths.forEach(path => {
    const len = path.getTotalLength();
    path.style.strokeDasharray = `${len}`;
    path.style.strokeDashoffset = `${len}`;
  });

  paths.forEach((path, i) => {
    const len = path.getTotalLength();
    path.animate(
      [{ strokeDashoffset: `${len}` }, { strokeDashoffset: '0' }],
      { duration: strokeDuration, delay: i * (strokeDuration + strokeGap), fill: 'forwards', easing: 'ease-in-out' }
    );
  });

  if (numbersGroup) {
    setTimeout(() => {
      numbersGroup.style.transition = 'opacity 0.4s';
      numbersGroup.style.opacity = '1';
    }, paths.length * (strokeDuration + strokeGap) + 100);
  }
}

async function showKanjiSheet(char) {
  const sheet    = document.getElementById('kanji-sheet');
  const body     = document.getElementById('kanji-sheet-body');
  const backdrop = document.getElementById('kanji-backdrop');

  body.innerHTML = '<div class="loading">Loading…</div>';
  sheet.classList.add('open');
  backdrop.classList.add('open');

  let data;
  try {
    const res = await fetch(`/api/wiki/kanji/${encodeURIComponent(char)}`);
    if (!res.ok) { body.innerHTML = `<div class="kanji-sheet-char">${escHtml(char)}</div><div class="msg" style="padding:16px 0">No data for this character</div>`; return; }
    data = await res.json();
  } catch {
    body.innerHTML = '<div class="msg">Failed to load</div>';
    return;
  }

  const k = data.kanji || {};
  const meta = [
    k.stroke_count ? `${k.stroke_count} strokes` : '',
    k.grade  ? `Grade ${k.grade}` : '',
    k.jlpt   ? `N${k.jlpt}` : '',
  ].filter(Boolean).join(' · ');

  let storiesHtml = '';
  if (k.stories) {
    const s = k.stories;
    storiesHtml = [
      s.keyword ? `<div style="margin-top:12px"><span class="kanji-reading-label">Keyword</span>${escHtml(s.keyword)}</div>` : '',
      (s.heisig_story || s.heisig_comment) ? `
        <div class="kanji-sheet-section-label">Heisig</div>
        ${s.heisig_story   ? `<p class="kanji-story-text">${escHtml(s.heisig_story)}</p>` : ''}
        ${s.heisig_comment ? `<p class="kanji-story-comment">${escHtml(s.heisig_comment)}</p>` : ''}` : '',
      s.koohi?.length ? `
        <div class="kanji-sheet-section-label">Koohi</div>
        <ol class="kanji-koohi-list">${s.koohi.map(t => `<li>${escHtml(t)}</li>`).join('')}</ol>` : '',
    ].join('');
  }

  const headwords = data.headwordPages || [];
  const notes     = data.notesPages    || [];
  let wikiHtml = '';
  if (headwords.length || notes.length) {
    const link = s => `<a href="/wiki/word/${encodeURIComponent(s)}" onclick="closeKanjiSheet()">${escHtml(s)}</a>`;
    wikiHtml = `<div class="kanji-sheet-section-label" style="margin-top:16px">Wiki pages</div>`;
    if (headwords.length) wikiHtml += `<div class="kanji-sheet-wiki-pages">${headwords.map(link).join(' ')}</div>`;
    if (notes.length)     wikiHtml += `<div class="kanji-sheet-wiki-pages kanji-sheet-wiki-notes">In notes: ${notes.map(link).join(' ')}</div>`;
  }

  body.innerHTML = `
    <div class="kanji-sheet-char">${escHtml(char)}</div>
    <div class="kanji-sheet-svg" id="kanji-svg-slot"></div>
    ${k.on?.length  ? `<div class="kanji-reading-row"><span class="kanji-reading-label">On</span>${k.on.join('　')}</div>` : ''}
    ${k.kun?.length ? `<div class="kanji-reading-row"><span class="kanji-reading-label">Kun</span>${k.kun.join('　')}</div>` : ''}
    ${k.meanings?.length ? `<div class="kanji-meanings">${k.meanings.map(escHtml).join(' · ')}</div>` : ''}
    ${meta ? `<div class="kanji-meta">${escHtml(meta)}</div>` : ''}
    ${k.components?.length ? `<div class="kanji-components"><span class="kanji-reading-label">Parts</span>${k.components.map(escHtml).join(' ')}</div>` : ''}
    ${storiesHtml}
    ${wikiHtml}
  `;

  if (k.svg_path) {
    fetch(k.svg_path).then(r => r.text()).then(svgText => {
      const slot = document.getElementById('kanji-svg-slot');
      if (!slot) return;
      const svgDoc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
      const svgEl  = svgDoc.querySelector('svg');
      if (!svgEl) return;
      slot.appendChild(document.importNode(svgEl, true));
      animateKanjiSvg(slot.querySelector('svg'));
    }).catch(() => {});
  }
}

document.getElementById('kanji-backdrop').addEventListener('click', closeKanjiSheet);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeKanjiSheet();
});

// Event delegation: kanji-tap buttons may be inside resultsDiv
document.addEventListener('click', e => {
  const btn = e.target.closest('.kanji-tap');
  if (btn) { e.preventDefault(); showKanjiSheet(btn.dataset.char); }
});

// ─── Dict / Wiki mode toggle ──────────────────────────────────────────────────

let wikiMode = false;
const modeToggle = document.getElementById('mode-toggle');

function setWikiMode(on) {
  wikiMode = on;
  modeToggle.textContent = on ? 'Wiki' : 'Dict';
  modeToggle.classList.toggle('wiki-active', on);
  searchInput.placeholder = on ? 'Search wiki…' : 'Search…';
}

modeToggle.addEventListener('click', () => {
  setWikiMode(!wikiMode);
  const q = searchInput.value.trim();
  if (q) {
    if (wikiMode) doWikiSearch(q);
    else { history.replaceState({}, '', `/search/${encodeURIComponent(q)}`); doSearch(q, 0); }
  } else {
    searchInput.focus();
  }
});

// ─── Wiki search ──────────────────────────────────────────────────────────────

async function doWikiSearch(q) {
  if (!q.trim()) {
    resultsDiv.innerHTML = '<div class="msg">Enter text to search wiki</div>';
    paginationDiv.innerHTML = '';
    return;
  }
  resultsDiv.innerHTML = '<div class="loading">Searching…</div>';
  paginationDiv.innerHTML = '';
  const data = await fetch(`/api/wiki/search?q=${encodeURIComponent(q)}`).then(r => r.json());
  renderWikiSearchResults(data, q);
}

function renderWikiSearchResults(data, q) {
  if (!data.results.length) {
    resultsDiv.innerHTML = `<div class="msg">No wiki pages matching "${escHtml(q)}"</div>`;
    return;
  }
  resultsDiv.innerHTML = data.results.map(r => `
    <a class="wiki-result" href="/wiki/word/${encodeURIComponent(r.slug)}">
      <span class="wiki-result-slug">${escHtml(r.slug)}</span>
      ${r.reading ? `<span class="wiki-result-reading">${escHtml(r.reading)}</span>` : ''}
      ${r.gloss   ? `<span class="wiki-result-gloss">${escHtml(r.gloss)}</span>`   : ''}
    </a>
  `).join('');
}

// ─── Search input ─────────────────────────────────────────────────────────────

searchInput.addEventListener('input', e => {
  const q = e.target.value;
  currentQuery = q;
  currentOffset = 0;

  const path = window.location.pathname;
  if (path !== '/' && !path.startsWith('/search/') && !path.startsWith('/wiki/search/')) {
    setMeta(wikiMode ? `<a href="/wiki">← Wiki</a>` : `<a href="/wiki">Wiki</a>`);
    paginationDiv.innerHTML = '';
  }

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (wikiMode) {
      const newPath = q.trim() ? `/wiki/search/${encodeURIComponent(q)}` : '/wiki';
      history.replaceState({}, '', newPath);
      doWikiSearch(q);
    } else {
      const newPath = q.trim() ? `/search/${encodeURIComponent(q)}` : '/';
      history.replaceState({}, '', newPath);
      doSearch(q, 0);
    }
  }, 300);
});

// ─── Router ───────────────────────────────────────────────────────────────────

async function router() {
  const parts = window.location.pathname.split('/').filter(Boolean);

  if (parts[0] === 'entry' && parts[1]) {
    await renderEntryPage(parts[1]);

  } else if (parts[0] === 'wiki' && parts[1] === 'search' && parts[2]) {
    const q = decodeURIComponent(parts[2]);
    setWikiMode(true);
    searchInput.value = q;
    currentQuery = q;
    setMeta(`<a href="/wiki">← Wiki</a>`);
    searchInput.focus();
    searchInput.setSelectionRange(q.length, q.length);
    await doWikiSearch(q);

  } else if (parts[0] === 'wiki' && !parts[1]) {
    await renderWikiIndexPage();

  } else if (parts[0] === 'wiki' && parts[1] === 'word' && parts[2]) {
    await renderWikiWordPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'wiki' && parts[1] === 'card' && parts[2]) {
    await renderWikiCardPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'wiki' && parts[1] === 'kana' && parts[2]) {
    await renderKanaPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'wiki' && parts[1] === 'kanji' && parts[2]) {
    await renderKanjiDetailPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'wiki' && parts[1] === 'kana') {
    history.replaceState({}, '', '/wiki');
    await renderWikiIndexPage();

  } else if (parts[0] === 'wiki' && parts[1] === 'tag' && parts[2]) {
    await renderWikiTagPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'search' && parts[1]) {
    const q = decodeURIComponent(parts[1]);
    setWikiMode(false);
    currentQuery = q;
    searchInput.value = q;
    setMeta(`<a href="/wiki">Wiki</a>`);
    searchInput.focus();
    searchInput.setSelectionRange(q.length, q.length);
    await doSearch(q, 0);

  } else {
    setMeta(`<a href="/wiki">Wiki</a>`);
    resultsDiv.innerHTML = '<div class="msg">Enter text to search</div>';
    searchInput.focus();
    checkStatus();
  }
}

populateTagsDatalist();
fetch('/api/config').then(r => r.json()).then(cfg => { window._jdictConfig = cfg; });

// Handle image shared via Web Share Target
// Server saves the image and redirects to /?sharedImage=FILENAME
const _sharedImage = new URLSearchParams(location.search).get('sharedImage');
if (_sharedImage) {
  sessionStorage.setItem('pendingImage', _sharedImage);
  history.replaceState({}, '', location.pathname);
  const targetSlug = sessionStorage.getItem('sharedImageTarget');
  if (targetSlug) {
    sessionStorage.removeItem('sharedImageTarget');
    history.replaceState({}, '', `/wiki/word/${encodeURIComponent(targetSlug)}`);
  }
}

router();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
