<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jdict</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --muted: #666666;
    --border: #dddddd;
    --accent: #0033bb;
    --tag-bg: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
  }
  header {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .search-row { display: flex; gap: 8px; align-items: center; }
  #search {
    flex: 1;
    padding: 8px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    outline: none;
  }
  #search:focus { border-color: var(--text); }
  #status { font-size: 11px; color: var(--muted); white-space: nowrap; }

  main { padding: 0 10px 60px; }
  #meta {
    padding: 8px 0;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    min-height: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Search results */
  .entry {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .entry-main-link { flex-grow: 1; min-width: 0; }
  a.entry-link { text-decoration: none; color: inherit; display: block; }
  .entry-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .kanji { font-size: 20px; font-weight: bold; }
  .kana { font-size: 14px; color: var(--muted); }
  .sense { margin-bottom: 4px; }
  .pos {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 1px 4px;
    border-radius: 2px;
    margin-right: 4px;
  }
  .gloss:not(:last-child)::after { content: "; "; }
  .s-inf { font-size: 12px; color: var(--muted); font-style: italic; }

  #pagination { display: flex; gap: 16px; padding: 20px 0; justify-content: center; }

  button {
    padding: 6px 14px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .msg { text-align: center; padding: 40px; color: var(--muted); }
  a { color: var(--accent); }

  /* Entry detail */
  .entry-detail { padding: 12px 0; }
  .entry-detail .kanji { font-size: 28px; }
  .entry-detail .sense {
    margin: 8px 0 8px 12px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin: 20px 0 10px;
  }

  /* Wiki form */
  .wiki-form label {
    display: block;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .wiki-form textarea {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 14px;
    font-family: inherit;
    min-height: 160px;
    line-height: 1.5;
    resize: vertical;
  }
  .wiki-form textarea:focus { outline: none; border-color: var(--text); }

  .form-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .save-status { font-size: 12px; color: var(--muted); }
  .save-status.dirty { color: #c05000; font-weight: bold; }

  /* Tag lozenge input */
  .tag-box {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 14px;
    cursor: text;
  }
  .tag-box:focus-within { border-color: var(--text); }
  .tag-text-input {
    flex-grow: 1;
    border: none;
    outline: none;
    padding: 3px 2px;
    font-size: 14px;
    min-width: 80px;
    font-family: inherit;
    background: transparent;
  }
  .lozenge {
    display: inline-flex;
    align-items: center;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 2px 8px 2px 10px;
    font-size: 12px;
    gap: 4px;
    white-space: nowrap;
  }
  .lozenge-x {
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    line-height: 1;
    padding: 0 1px;
  }
  .lozenge-x:hover { color: var(--text); }

  /* Image drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .drop-zone.drag-over { border-color: var(--accent); background: #f0f4ff; }
  .drop-zone img { max-width: 100%; max-height: 280px; display: block; margin: 0 auto 10px; border-radius: 3px; }
  .drop-zone input[type="file"] { display: none; }
  .drop-zone .dz-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .drop-zone .dz-remove { color: var(--accent); cursor: pointer; }

  /* Context list */
  .context-list { list-style: none; padding: 0; margin-bottom: 4px; }
  .context-list li { font-size: 12px; color: var(--muted); padding: 2px 0; }

  /* Wiki index */
  .wiki-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  @media (max-width: 480px) { .wiki-cols { grid-template-columns: 1fr; } }
  .wiki-list { list-style: none; padding: 0; }
  .wiki-list li { padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .wiki-list a { text-decoration: none; color: var(--text); }
  .wiki-list a:hover { color: var(--accent); }
  .wiki-none { font-size: 12px; color: var(--muted); padding: 4px 0; }

  /* Tag word grid */
  .word-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .word-chips a {
    display: inline-block;
    background: var(--tag-bg);
    border-radius: 4px;
    padding: 4px 12px;
    text-decoration: none;
    color: var(--text);
    font-size: 17px;
  }
  .word-chips a:hover { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="search-row">
    <input id="search" type="search" placeholder="Search…" autocomplete="off">
    <div id="status">…</div>
  </div>
</header>

<main>
  <div id="meta"></div>
  <div id="results"><div class="msg">Enter text to search</div></div>
  <div id="pagination"></div>
  <datalist id="tags-list"></datalist>
</main>

<script>
// ─── Helpers ──────────────────────────────────────────────────────────────────

function slugify(text) {
  return text.toString().trim()
    .replace(/[\s\/\?#%&]+/g, '-')
    .replace(/[^a-zA-Z0-9\u3000-\u303F\u3040-\u309F\u30A0-\u30FF\uFF00-\uFFEF\u4E00-\u9FAF\u3400-\u4DBF-]+/g, '')
    .replace(/--+/g, '-');
}

function primaryForm(entry) {
  return entry.kanji[0]?.keb || entry.kana[0]?.reb || '';
}

function readingForm(entry) {
  return entry.kanji.length ? (entry.kana[0]?.reb || '') : '';
}

function renderSenses(senses, max = Infinity) {
  return senses.slice(0, max).map(s => {
    const glosses = s.glosses.filter(g => g.lang === 'eng');
    if (!glosses.length) return '';
    return `<div class="sense">
      ${s.pos.length ? `<span class="pos">${s.pos[0]}</span>` : ''}
      ${glosses.map(g => `<span class="gloss">${g.text}</span>`).join('')}
      ${s.s_inf?.length ? `<div class="s-inf">${s.s_inf.join('; ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────

const searchInput  = document.getElementById('search');
const resultsDiv   = document.getElementById('results');
const metaDiv      = document.getElementById('meta');
const paginationDiv = document.getElementById('pagination');
const statusDiv    = document.getElementById('status');
const tagsDatalist = document.getElementById('tags-list');

let currentQuery  = '';
let currentOffset = 0;
let debounceTimer = null;
const LIMIT = 20;

// Capture source context from the calling app (e.g. podcast player URL)
const pageSource = new URLSearchParams(window.location.search).get('source') || '';

// ─── Status ───────────────────────────────────────────────────────────────────

async function checkStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    statusDiv.textContent = d.ready ? `${d.entry_count.toLocaleString()} entries` : 'No DB';
  } catch { statusDiv.textContent = 'Offline'; }
}

// ─── Tags datalist ────────────────────────────────────────────────────────────

async function populateTagsDatalist() {
  try {
    const tags = await fetch('/api/wiki/tags').then(r => r.json());
    tagsDatalist.innerHTML = tags.map(t => `<option value="${t}">`).join('');
  } catch {}
}

// ─── Tag lozenge widget ───────────────────────────────────────────────────────

function makeTagWidget(container, initialTags, onChange) {
  let tags = [...initialTags];

  function renderLozenges() {
    container.querySelectorAll('.lozenge').forEach(el => el.remove());
    const input = container.querySelector('.tag-text-input');
    tags.forEach(tag => {
      const el = document.createElement('span');
      el.className = 'lozenge';
      el.innerHTML = `<span>${tag}</span><span class="lozenge-x" data-tag="${tag}">×</span>`;
      container.insertBefore(el, input);
    });
  }

  container.addEventListener('click', e => {
    if (e.target.classList.contains('lozenge-x')) {
      tags = tags.filter(t => t !== e.target.dataset.tag);
      renderLozenges();
      onChange?.();
    } else {
      container.querySelector('.tag-text-input').focus();
    }
  });

  const input = container.querySelector('.tag-text-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = input.value.trim().replace(/,+$/, '');
      if (val && !tags.includes(val)) { tags.push(val); renderLozenges(); onChange?.(); }
      else if (val && tags.includes(val)) { input.value = ''; } // already exists, just clear
      input.value = '';
    } else if (e.key === 'Backspace' && input.value === '' && tags.length) {
      tags.pop();
      renderLozenges();
      onChange?.();
    }
  });

  renderLozenges();
  return { getTags: () => [...tags] };
}

// ─── Image drop zone widget ───────────────────────────────────────────────────

function makeDropZone(zone, initialFilename, onChange) {
  let current = initialFilename || '';

  function showEmpty() {
    current = '';
    zone.innerHTML = `<div>Drop an image here or click to select</div><input type="file" accept="image/*">`;
    bindFileInput();
  }

  function showImage(filename) {
    current = filename;
    zone.innerHTML = `
      <img src="/wiki/images/${filename}" alt="">
      <div class="dz-hint">Click or drop to replace &nbsp;·&nbsp; <span class="dz-remove">Remove</span></div>
      <input type="file" accept="image/*">
    `;
    zone.querySelector('.dz-remove').addEventListener('click', e => { e.stopPropagation(); showEmpty(); onChange?.(); });
    bindFileInput();
  }

  function showUploading() {
    zone.innerHTML = `<div>Uploading…</div>`;
  }

  function bindFileInput() {
    zone.querySelector('input[type="file"]').addEventListener('change', function() {
      if (this.files[0]) upload(this.files[0]);
    });
  }

  async function upload(file) {
    const prev = current;
    showUploading();
    const fd = new FormData();
    fd.append('image', file);
    try {
      const res = await fetch('/api/wiki/image-upload', { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      const { filename } = await res.json();
      showImage(filename);
      onChange?.();
    } catch {
      alert('Image upload failed');
      prev ? showImage(prev) : showEmpty();
    }
  }

  zone.addEventListener('click', () => zone.querySelector('input[type="file"]')?.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file?.type.startsWith('image/')) upload(file);
  });

  initialFilename ? showImage(initialFilename) : showEmpty();
  return { getFilename: () => current };
}

// ─── Search ───────────────────────────────────────────────────────────────────

async function doSearch(q, offset = 0) {
  if (!q.trim()) {
    resultsDiv.innerHTML = '<div class="msg">Enter text to search</div>';
    paginationDiv.innerHTML = '';
    return;
  }
  resultsDiv.innerHTML = '<div class="loading">Searching…</div>';
  try {
    const data = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=${LIMIT}&offset=${offset}`).then(r => r.json());
    renderSearchResults(data, q, offset);
  } catch {
    resultsDiv.innerHTML = '<div class="msg">Search failed</div>';
  }
}

function renderSearchResults(data, q, offset) {
  if (!data.results?.length) {
    resultsDiv.innerHTML = '<div class="msg">No results</div>';
    paginationDiv.innerHTML = '';
    return;
  }

  resultsDiv.innerHTML = data.results.map(e => `
    <div class="entry">
      <div class="entry-main-link">
        <a class="entry-link" href="/entry/${e.seq}">
          <div class="entry-head">
            <span class="kanji">${primaryForm(e)}</span>
            ${readingForm(e) ? `<span class="kana">${readingForm(e)}</span>` : ''}
          </div>
          ${renderSenses(e.senses, 2)}
        </a>
      </div>
    </div>
  `).join('');

  paginationDiv.innerHTML = '';
  if (offset > 0) {
    const btn = document.createElement('button');
    btn.textContent = '← Previous';
    btn.onclick = () => { currentOffset -= LIMIT; doSearch(q, currentOffset); scrollTo(0, 0); };
    paginationDiv.appendChild(btn);
  }
  if (data.results.length === LIMIT) {
    const btn = document.createElement('button');
    btn.textContent = 'Next →';
    btn.onclick = () => { currentOffset += LIMIT; doSearch(q, currentOffset); scrollTo(0, 0); };
    paginationDiv.appendChild(btn);
  }
}

// ─── Entry detail ─────────────────────────────────────────────────────────────

async function renderEntryPage(seq) {
  setMeta(`<a href="javascript:history.back()">← Back</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  let entry;
  try {
    entry = await fetch(`/api/entry/${seq}`).then(r => r.json());
  } catch { resultsDiv.innerHTML = '<div class="msg">Failed to load entry</div>'; return; }
  if (entry.error) { resultsDiv.innerHTML = `<div class="msg">${entry.error}</div>`; return; }

  document.title = `${primaryForm(entry)} — jdict`;

  const slug = slugify(primaryForm(entry));
  const wikiRes = await fetch(`/api/wiki/word/${slug}`);
  const hasWiki = wikiRes.ok;

  resultsDiv.innerHTML = `
    <div class="entry-detail">
      <div class="entry-head">
        <span class="kanji">${entry.kanji.map(k => k.keb).join('、') || entry.kana.map(k => k.reb).join('、')}</span>
        ${entry.kanji.length ? `<span class="kana">${entry.kana.map(k => k.reb).join('、')}</span>` : ''}
      </div>
      ${renderSenses(entry.senses)}
      <div style="margin-top: 20px;">
        <button class="primary" id="wiki-btn">${hasWiki ? '✎ Edit in Wiki' : '+ Add to Wiki'}</button>
      </div>
    </div>
  `;

  document.getElementById('wiki-btn').addEventListener('click', () => addToWiki(entry));
}

async function addToWiki(entry) {
  const btn = document.getElementById('wiki-btn');
  btn.disabled = true;
  btn.textContent = '…';

  const slug = slugify(primaryForm(entry));

  // If wiki page already exists, go straight there
  const check = await fetch(`/api/wiki/word/${slug}`);
  if (check.ok) { location.href = `/wiki/word/${slug}`; return; }

  // Create a new page, pre-filled with the top glosses
  const glosses = entry.senses.slice(0, 3)
    .flatMap(s => s.glosses.filter(g => g.lang === 'eng').map(g => g.text));
  const notes = glosses.map((g, i) => `${i + 1}. ${g}`).join('\n');
  const ctx = { source: pageSource || `entry:${entry.seq}`, timestamp: new Date().toISOString() };

  try {
    await fetch(`/api/wiki/word/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        seq: entry.seq,
        word: primaryForm(entry),
        notes,
        tags: [],
        contexts: [ctx],
        image: '',
      }),
    });
    location.href = `/wiki/word/${slug}`;
  } catch {
    btn.disabled = false;
    btn.textContent = '+ Add to Wiki';
    alert('Failed to create wiki page');
  }
}

// ─── Wiki word page ───────────────────────────────────────────────────────────

async function renderWikiWordPage(slug) {
  setMeta(`<a href="javascript:history.back()">← Back</a> &nbsp;·&nbsp; <a href="/wiki">Wiki</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  const wikiRes = await fetch(`/api/wiki/word/${slug}`);
  if (!wikiRes.ok) { resultsDiv.innerHTML = '<div class="msg">Wiki page not found</div>'; return; }
  const wiki = await wikiRes.json();

  // Fetch the dictionary entry by seq (stored when page was created)
  let entry = null;
  if (wiki.seq) {
    try {
      const r = await fetch(`/api/entry/${wiki.seq}`);
      if (r.ok) entry = await r.json();
    } catch {}
  }

  const displayName = wiki.word || (entry ? primaryForm(entry) : slug);
  document.title = `${displayName} — jdict Wiki`;

  resultsDiv.innerHTML = `
    <div class="entry-detail">
      <div class="entry-head">
        <span class="kanji">${entry ? (entry.kanji.map(k => k.keb).join('、') || entry.kana.map(k => k.reb).join('、')) : displayName}</span>
        ${entry?.kanji.length ? `<span class="kana">${entry.kana.map(k => k.reb).join('、')}</span>` : ''}
      </div>
      ${entry ? renderSenses(entry.senses) : ''}
    </div>

    ${wiki.contexts?.length ? `
      <div class="section-label">Lookup history</div>
      <ul class="context-list">
        ${wiki.contexts.map(c => {
          const src = c.source || '';
          const srcHtml = src.match(/^https?:\/\/|^\w+:\/\//)
            ? `<a href="${src}" target="_blank">${src}</a>`
            : src;
          return `<li>${new Date(c.timestamp).toLocaleDateString()} — ${srcHtml}</li>`;
        }).join('')}
      </ul>
    ` : ''}

    <div class="section-label">Notes &amp; Tags</div>
    <form class="wiki-form" id="wiki-form">
      <label>Tags</label>
      <div class="tag-box" id="tag-box">
        <input class="tag-text-input" type="text" list="tags-list" placeholder="Add tag…">
      </div>

      <label for="wiki-notes">Notes</label>
      <textarea id="wiki-notes">${escHtml(wiki.notes || '')}</textarea>

      <label>Image</label>
      <div class="drop-zone" id="drop-zone"></div>

      <div class="form-row">
        <button type="submit" class="primary" id="save-btn">Save</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </form>
  `;

  const statusEl = document.getElementById('save-status');
  const saveBtn  = document.getElementById('save-btn');
  let isDirty = false;

  function markDirty() {
    isDirty = true;
    statusEl.textContent = '● unsaved';
    statusEl.classList.add('dirty');
  }

  async function save() {
    saveBtn.disabled = true;
    statusEl.textContent = 'Saving…';
    statusEl.classList.remove('dirty');
    try {
      await fetch(`/api/wiki/word/${slug}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          seq: wiki.seq,
          word: wiki.word,
          tags: tagWidget.getTags(),
          notes: document.getElementById('wiki-notes').value,
          contexts: wiki.contexts || [],
          image: dropZone.getFilename(),
        }),
      });
      isDirty = false;
      statusEl.textContent = 'Saved';
      populateTagsDatalist();
    } catch {
      statusEl.textContent = 'Save failed';
      statusEl.classList.add('dirty');
    } finally {
      saveBtn.disabled = false;
      setTimeout(() => { if (!isDirty) statusEl.textContent = ''; }, 2500);
    }
  }

  const tagWidget = makeTagWidget(document.getElementById('tag-box'), wiki.tags || [], markDirty);
  const dropZone  = makeDropZone(document.getElementById('drop-zone'), wiki.image || '', markDirty);

  document.getElementById('wiki-notes').addEventListener('input', markDirty);

  document.getElementById('wiki-form').addEventListener('submit', e => { e.preventDefault(); save(); });
}

// ─── Wiki tag page ─────────────────────────────────────────────────────────────

async function renderWikiTagPage(tagName) {
  setMeta(`<a href="/wiki">← Wiki</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  const res = await fetch(`/api/wiki/tag/${tagName}`);
  if (!res.ok) { resultsDiv.innerHTML = '<div class="msg">Tag not found</div>'; return; }
  const tag = await res.json();

  document.title = `${tagName} — jdict Wiki`;

  resultsDiv.innerHTML = `
    <div style="font-size:22px;font-weight:bold;margin:12px 0 16px">${tagName}</div>

    <form class="wiki-form" id="tag-form">
      <label for="tag-notes">Notes</label>
      <textarea id="tag-notes">${escHtml(tag.notes || '')}</textarea>

      <label>Image</label>
      <div class="drop-zone" id="drop-zone"></div>

      <div class="form-row">
        <button type="submit" class="primary" id="tag-save-btn">Save</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </form>

    <div class="section-label">Words (${tag.words?.length || 0})</div>
    <div class="word-chips">
      ${(tag.words || []).map(w => `<a href="/wiki/word/${w.name}">${w.name}</a>`).join('')}
    </div>
  `;

  const dropZone  = makeDropZone(document.getElementById('drop-zone'), tag.image || '', markDirty);
  const statusEl  = document.getElementById('save-status');
  const saveBtn   = document.getElementById('tag-save-btn');

  function markDirty() {
    statusEl.textContent = '● unsaved';
    statusEl.classList.add('dirty');
  }

  document.getElementById('tag-notes').addEventListener('input', markDirty);

  document.getElementById('tag-form').addEventListener('submit', async e => {
    e.preventDefault();
    saveBtn.disabled = true;
    statusEl.textContent = 'Saving…';
    statusEl.classList.remove('dirty');
    try {
      await fetch(`/api/wiki/tag/${tagName}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          notes: document.getElementById('tag-notes').value,
          image: dropZone.getFilename(),
        }),
      });
      statusEl.textContent = 'Saved';
    } catch {
      statusEl.textContent = 'Save failed';
      statusEl.classList.add('dirty');
    } finally {
      saveBtn.disabled = false;
      setTimeout(() => { statusEl.textContent = ''; }, 2500);
    }
  });
}

// ─── Wiki index ───────────────────────────────────────────────────────────────

async function renderWikiIndexPage() {
  setMeta(`<a href="/">← Search</a>`);
  paginationDiv.innerHTML = '';
  resultsDiv.innerHTML = '<div class="loading">Loading…</div>';

  const data = await fetch('/api/wiki/index').then(r => r.json());

  function wikiList(items, base) {
    if (!items?.length) return '<p class="wiki-none">None yet</p>';
    return `<ul class="wiki-list">${items.map(i => `<li><a href="${base}${i.name}">${i.name}</a></li>`).join('')}</ul>`;
  }

  resultsDiv.innerHTML = `
    <div style="font-size:22px;font-weight:bold;margin:12px 0 16px">Wiki</div>
    <div class="wiki-cols">
      <div>
        <div class="section-label">Recently added words</div>
        ${wikiList(data.wordsByCreated, '/wiki/word/')}
      </div>
      <div>
        <div class="section-label">Recently edited words</div>
        ${wikiList(data.wordsByModified, '/wiki/word/')}
      </div>
      <div>
        <div class="section-label">Recently added tags</div>
        ${wikiList(data.tagsByCreated, '/wiki/tag/')}
      </div>
      <div>
        <div class="section-label">Recently edited tags</div>
        ${wikiList(data.tagsByModified, '/wiki/tag/')}
      </div>
    </div>
  `;
}

// ─── Misc ─────────────────────────────────────────────────────────────────────

function setMeta(html) {
  metaDiv.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Search input ─────────────────────────────────────────────────────────────

searchInput.addEventListener('input', e => {
  const q = e.target.value;
  currentQuery = q;
  currentOffset = 0;

  // If we're not already in a search view, reset the page chrome
  const path = window.location.pathname;
  if (path !== '/' && !path.startsWith('/search/')) {
    setMeta(`<a href="/wiki">Wiki</a>`);
    paginationDiv.innerHTML = '';
  }

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const newPath = q.trim() ? `/search/${encodeURIComponent(q)}` : '/';
    history.replaceState({}, '', newPath);
    doSearch(q, 0);
  }, 300);
});

// ─── Router ───────────────────────────────────────────────────────────────────

async function router() {
  const parts = window.location.pathname.split('/').filter(Boolean);

  if (parts[0] === 'entry' && parts[1]) {
    await renderEntryPage(parts[1]);

  } else if (parts[0] === 'wiki' && !parts[1]) {
    await renderWikiIndexPage();

  } else if (parts[0] === 'wiki' && parts[1] === 'word' && parts[2]) {
    await renderWikiWordPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'wiki' && parts[1] === 'tag' && parts[2]) {
    await renderWikiTagPage(decodeURIComponent(parts[2]));

  } else if (parts[0] === 'search' && parts[1]) {
    const q = decodeURIComponent(parts[1]);
    currentQuery = q;
    searchInput.value = q;
    setMeta(`<a href="/wiki">Wiki</a>`);
    searchInput.focus();
    searchInput.setSelectionRange(q.length, q.length);
    await doSearch(q, 0);

  } else {
    setMeta(`<a href="/wiki">Wiki</a>`);
    resultsDiv.innerHTML = '<div class="msg">Enter text to search</div>';
    searchInput.focus();
    checkStatus();
  }
}

populateTagsDatalist();
router();
</script>
